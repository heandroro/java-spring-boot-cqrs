spring:
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password: 
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    root: INFO
    com.company.orders: DEBUG
    org.springframework.web: WARN
    org.hibernate.SQL: DEBUG

jwt:
  secret: a-dummy-secret-for-testing-only-12345
  expiration: 86400
